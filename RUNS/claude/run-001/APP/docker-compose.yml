services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  app:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/copilot_metrics
      - RAW_DATA_DIR=/data/raw
      - PORT=3000
    volumes:
      - ../../../../DATA/raw:/data/raw:ro
    depends_on:
      - mongo

volumes:
  mongo-data:
